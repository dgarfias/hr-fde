services:
  postgres:
    image: postgres:16-alpine
    container_name: hr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-happyrobot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-happyrobot}
      POSTGRES_DB: ${POSTGRES_DB:-happyrobot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-happyrobot} -d ${POSTGRES_DB:-happyrobot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: hr-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-happyrobot}:${POSTGRES_PASSWORD:-happyrobot}@postgres:5432/${POSTGRES_DB:-happyrobot}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
